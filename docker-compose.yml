services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: nrh-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${DB_PASSWORD:-YourStrong@Passw0rd}
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$${MSSQL_SA_PASSWORD}" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nrh-migrate
    environment:
      DB_SERVER: sqlserver
      DB_PORT: 1433
      DB_USER: sa
      DB_PASSWORD: ${DB_PASSWORD:-YourStrong@Passw0rd}
      DB_NAME: nrh_gmvv
      DB_TRUST_CERT: "true"
      DB_SCRIPTS_DIR: /database
    volumes:
      - ./database:/database:ro
    command: sh -c "sleep 5 && npm run db:migrate"
    depends_on:
      sqlserver:
        condition: service_healthy

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nrh-api
    environment:
      API_PORT: 3001
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:9002}
      DB_SERVER: sqlserver
      DB_PORT: 1433
      DB_USER: sa
      DB_PASSWORD: ${DB_PASSWORD:-YourStrong@Passw0rd}
      DB_NAME: nrh_gmvv
      DB_TRUST_CERT: "true"
    ports:
      - "3001:3001"
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: nrh-frontend
    environment:
      NEXT_PUBLIC_USE_API: "true"
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "9002:9002"
    depends_on:
      - api

volumes:
  sqlserver_data:
